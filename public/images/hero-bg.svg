<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Base background -->
  <rect width="1440" height="900" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="350" fill="url(#glow1)" filter="url(#blur1)"/>
  <circle cx="1200" cy="600" r="400" fill="url(#glow2)" filter="url(#blur2)"/>
  <circle cx="800" cy="100" r="250" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1440" y2="100"/>
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="500" x2="1440" y2="500"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="700" x2="1440" y2="700"/>
    <line x1="0" y1="800" x2="1440" y2="800"/>
    <line x1="100" y1="0" x2="100" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="700" y1="0" x2="700" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1100" y1="0" x2="1100" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1300" y1="0" x2="1300" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
  <!-- Floating dots -->
  <g opacity="0.3" fill="#ffffff">
    <circle cx="120" cy="80" r="2"/>
    <circle cx="340" cy="150" r="1.5"/>
    <circle cx="580" cy="60" r="2.5"/>
    <circle cx="820" cy="130" r="1.5"/>
    <circle cx="1050" cy="70" r="2"/>
    <circle cx="1280" cy="110" r="1.5"/>
    <circle cx="200" cy="350" r="2"/>
    <circle cx="450" cy="420" r="1.5"/>
    <circle cx="700" cy="380" r="2.5"/>
    <circle cx="950" cy="440" r="1.5"/>
    <circle cx="1150" cy="360" r="2"/>
    <circle cx="1380" cy="400" r="1.5"/>
    <circle cx="80" cy="600" r="2"/>
    <circle cx="320" cy="680" r="1.5"/>
    <circle cx="560" cy="620" r="2.5"/>
    <circle cx="800" cy="700" r="1.5"/>
    <circle cx="1040" cy="640" r="2"/>
    <circle cx="1300" cy="720" r="1.5"/>
  </g>
  <!-- Diagonal accent lines -->
  <g opacity="0.05" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="900" x2="900" y2="0"/>
    <line x1="200" y1="900" x2="1100" y2="0"/>
    <line x1="400" y1="900" x2="1300" y2="0"/>
  </g>
  <!-- Bottom fade -->
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="60%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#fade)"/>
</svg>
